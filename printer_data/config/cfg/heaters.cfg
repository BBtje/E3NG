##################-----     E0 (EXTRUDER) - M5    ------##################
[extruder]
step_pin: EBB:PD0
dir_pin: !EBB:PD1
enable_pin: !EBB:PD2
microsteps: 16
rotation_distance: 28.8877 #for 5mm Shaft Driven Bondtech gearsets
gear_ratio: 50:8 #for sherpa mini 8t motor
full_steps_per_rotation: 200 #1.8deg Motor
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB:PB13 #HE0
sensor_pin:  EBB:PA3 # T0
sensor_type: ATC Semitec 104NT-4-R025H42G
pressure_advance: 0.045
control: pid
pid_Kp: 14.859
pid_Ki: 0.739
pid_Kd: 74.670
min_temp: 0
max_temp: 280
min_extrude_temp: 0
max_extrude_only_distance: 110.0
max_extrude_cross_section: 60

[tmc2209 extruder]
uart_pin: EBB:PA15
run_current: 0.650
#hold_current: 0.300
stealthchop_threshold: 0

#########################################################

[heater_bed]
heater_pin: PD7
sensor_pin: PA1 # TB
sensor_type: Generic 3950
control: pid
pid_kp = 48.514
pid_ki = 1.004
pid_kd = 585.806
min_temp: 0
max_temp: 200
